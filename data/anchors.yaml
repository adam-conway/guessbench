# Anchors (SPEC 5.3): four fixed artifacts with pinned expected behavior.
anchors:
  - id: A1
    name: exact string
    prompt: "Reply with exactly the word: HELLO"
    assertion: "after whitespace-trim, all samples identical; k = 1; EI = 1.0"
  - id: A2
    name: paraphrase-invariant
    prompt: "In one sentence, explain why the sky appears blue to a human observer on Earth."
    assertion: "high lexical diversity, one meaning; EI <= 1.3"
  - id: A3
    name: explicit two-way fork
    prompt: "Choose either 'heads' or 'tails'. Reply with just your choice."
    assertion: "every sample in one of exactly two clusters; k <= 2; EI in [1, 2]"
  - id: A4
    name: maximally open
    prompt: "Write something."
    assertion: "EI(A4) > EI(A2) by a wide margin, and EI(A4) >= 4.0 at defaults"
